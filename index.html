<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FIRETREND - Product Intelligence</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 42px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .tagline {
            color: rgba(255,255,255,0.9);
            font-size: 14px;
            margin-top: 5px;
        }

        /* Filter Bar - Like Excel */
        .filter-bar {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: flex-end;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .filter-item {
            flex: 1;
            min-width: 130px;
        }

        .filter-item label {
            display: block;
            font-size: 11px;
            font-weight: bold;
            color: #555;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .filter-item select, .filter-item input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            background: white;
        }

        .reset-btn {
            background: #764ba2;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Table Layout - Like Excel */
        .products-table {
            background: white;
            border-radius: 12px;
            overflow-x: auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th {
            background: #f5f5f5;
            padding: 15px 12px;
            text-align: left;
            font-weight: bold;
            color: #333;
            border-bottom: 2px solid #ddd;
            cursor: pointer;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            vertical-align: middle;
        }

        .product-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .product-img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 10px;
            background: #f0f0f0;
        }

        .product-name {
            font-weight: bold;
        }

        .trend-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }

        .trending {
            background: #ff4757;
            color: white;
        }

        .upcoming {
            background: #a29bfe;
            color: white;
        }

        .price {
            font-weight: bold;
            color: #667eea;
        }

        .margin-high {
            color: #4caf50;
            font-weight: bold;
        }

        .margin-medium {
            color: #ff9800;
            font-weight: bold;
        }

        .margin-low {
            color: #f44336;
            font-weight: bold;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            padding: 20px;
            color: white;
            font-size: 12px;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            th, td {
                padding: 8px;
                font-size: 12px;
            }
            .product-img {
                width: 40px;
                height: 40px;
            }
            .filter-bar {
                flex-direction: column;
            }
            .filter-item {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔥 FIRETREND</h1>
            <div class="tagline">Product Intelligence | Profit Analytics | Market Trends</div>
        </div>

        <!-- Excel-like Filter Bar -->
        <div class="filter-bar">
            <div class="filter-item">
                <label>🌍 COUNTRY</label>
                <select id="filterCountry">
                    <option value="all">All Countries</option>
                    <option value="India">🇮🇳 India</option>
                    <option value="USA">🇺🇸 USA</option>
                    <option value="UAE">🇦🇪 UAE</option>
                    <option value="UK">🇬🇧 UK</option>
                    <option value="Germany">🇩🇪 Germany</option>
                    <option value="Canada">🇨🇦 Canada</option>
                </select>
            </div>
            <div class="filter-item">
                <label>💰 PRICE RANGE</label>
                <select id="filterPrice">
                    <option value="all">All Prices</option>
                    <option value="0-25">Under $25</option>
                    <option value="25-50">$25 - $50</option>
                    <option value="50-100">$50 - $100</option>
                    <option value="100-500">$100 - $500</option>
                </select>
            </div>
            <div class="filter-item">
                <label>📈 PROFIT MARGIN</label>
                <select id="filterMargin">
                    <option value="all">All Margins</option>
                    <option value="50-100">50%+ (High)</option>
                    <option value="30-50">30-50% (Medium)</option>
                    <option value="0-30">Below 30% (Low)</option>
                </select>
            </div>
            <div class="filter-item">
                <label>📊 UNITS SOLD</label>
                <select id="filterSales">
                    <option value="all">All Sales</option>
                    <option value="10000">10,000+ sold</option>
                    <option value="5000-10000">5,000 - 10,000</option>
                    <option value="1000-5000">1,000 - 5,000</option>
                    <option value="0-1000">Below 1,000</option>
                </select>
            </div>
            <div class="filter-item">
                <label>🏷️ CATEGORY</label>
                <select id="filterCategory">
                    <option value="all">All Products</option>
                    <option value="trending">🔥 Trending Now</option>
                    <option value="upcoming">🚀 Upcoming</option>
                </select>
            </div>
            <button class="reset-btn" id="resetFilters">Reset Filters</button>
        </div>

        <!-- Excel-like Table -->
        <div class="products-table">
            <table id="productTable">
                <thead>
                    <tr>
                        <th onclick="sortTable(0)">📦 Product ⬍</th>
                        <th onclick="sortTable(1)">💰 Price ⬍</th>
                        <th onclick="sortTable(2)">🌍 Country ⬍</th>
                        <th onclick="sortTable(3)">📈 Margin ⬍</th>
                        <th onclick="sortTable(4)">📊 Sold ⬍</th>
                        <th onclick="sortTable(5)">🏷️ Trend ⬍</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Data loaded here -->
                </tbody>
            </table>
        </div>

        <div class="footer">
            📊 Data updates daily | Click column headers to sort | Last update: April 3, 2026
        </div>
    </div>

    <script>
        // Product Database
        const products = [
            { name: "Wireless Earbuds Pro", price: 49.99, country: "USA", margin: 65, sold: 12500, trend: "trending", image: "https://placehold.co/200x200/667eea/white?text=🎧" },
            { name: "Smart Fitness Ring", price: 89.99, country: "India", margin: 58, sold: 8200, trend: "trending", image: "https://placehold.co/200x200/764ba2/white?text=💍" },
            { name: "Portable Solar Charger", price: 39.99, country: "UAE", margin: 52, sold: 6800, trend: "trending", image: "https://placehold.co/200x200/ff4757/white?text=☀️" },
            { name: "Reusable Food Lids", price: 19.99, country: "UK", margin: 70, sold: 3400, trend: "upcoming", image: "https://placehold.co/200x200/a29bfe/white?text=🥗" },
            { name: "Mini Air Purifier", price: 59.99, country: "India", margin: 55, sold: 9100, trend: "trending", image: "https://placehold.co/200x200/4caf50/white?text=💨" },
            { name: "Foldable Laptop Stand", price: 29.99, country: "USA", margin: 62, sold: 4700, trend: "upcoming", image: "https://placehold.co/200x200/ff9800/white?text=💻" },
            { name: "Smart Watch Pro", price: 149.99, country: "UAE", margin: 55, sold: 15200, trend: "trending", image: "https://placehold.co/200x200/2196f3/white?text=⌚" },
            { name: "Yoga Mat Premium", price: 39.99, country: "India", margin: 70, sold: 11300, trend: "trending", image: "https://placehold.co/200x200/9c27b0/white?text=🧘" },
            { name: "LED Strip Lights", price: 24.99, country: "UK", margin: 65, sold: 5900, trend: "upcoming", image: "https://placehold.co/200x200/00bcd4/white?text=💡" },
            { name: "Phone Gimbal", price: 79.99, country: "USA", margin: 55, sold: 7400, trend: "trending", image: "https://placehold.co/200x200/e91e63/white?text=📱" },
            { name: "Noise Cancelling Headphones", price: 199.99, country: "Germany", margin: 60, sold: 5300, trend: "trending", image: "https://placehold.co/200x200/673ab7/white?text=🎧" },
            { name: "Smart Home Hub", price: 129.99, country: "Canada", margin: 48, sold: 3100, trend: "upcoming", image: "https://placehold.co/200x200/3f51b5/white?text=🏠" }
        ];

        let currentFilters = {
            country: "all",
            price: "all",
            margin: "all",
            sales: "all",
            category: "all"
        };

        function getMarginClass(margin) {
            if (margin >= 50) return "margin-high";
            if (margin >= 30) return "margin-medium";
            return "margin-low";
        }

        function filterProducts() {
            return products.filter(p => {
                // Country filter
                if (currentFilters.country !== "all" && p.country !== currentFilters.country) return false;
                
                // Price filter
                if (currentFilters.price !== "all") {
                    const [min, max] = currentFilters.price.split("-").map(Number);
                    if (max && (p.price < min || p.price > max)) return false;
                    if (!max && p.price < min) return false;
                }
                
                // Margin filter
                if (currentFilters.margin !== "all") {
                    const [min, max] = currentFilters.margin.split("-").map(Number);
                    if (p.margin < min || (max && p.margin > max)) return false;
                }
                
                // Sales filter
                if (currentFilters.sales !== "all") {
                    if (currentFilters.sales === "10000" && p.sold < 10000) return false;
                    if (currentFilters.sales === "5000-10000" && (p.sold < 5000 || p.sold > 10000)) return false;
                    if (currentFilters.sales === "1000-5000" && (p.sold < 1000 || p.sold > 5000)) return false;
                    if (currentFilters.sales === "0-1000" && p.sold > 1000) return false;
                }
                
                // Category filter
                if (currentFilters.category !== "all" && p.trend !== currentFilters.category) return false;
                
                return true;
            });
        }

        function renderTable() {
            const filtered = filterProducts();
            const tbody = document.getElementById('tableBody');
            
            tbody.innerHTML = filtered.map(p => `
                <tr>
                    <td>
                        <div class="product-cell">
                            <img src="${p.image}" class="product-img" alt="${p.name}">
                            <span class="product-name">${p.name}</span>
                        </div>
                    </td>
                    <td class="price">$${p.price}</td>
                    <td>${p.country}</td>
                    <td class="${getMarginClass(p.margin)}">${p.margin}%</td>
                    <td>${p.sold.toLocaleString()}</td>
                    <td><span class="trend-badge ${p.trend}">${p.trend === 'trending' ? '🔥 TRENDING' : '🚀 UPCOMING'}</span></td>
                </tr>
            `).join('');
        }

        function setupFilters() {
            document.getElementById('filterCountry').addEventListener('change', (e) => {
                currentFilters.country = e.target.value;
                renderTable();
            });
            document.getElementById('filterPrice').addEventListener('change', (e) => {
                currentFilters.price = e.target.value;
                renderTable();
            });
            document.getElementById('filterMargin').addEventListener('change', (e) => {
                currentFilters.margin = e.target.value;
                renderTable();
            });
            document.getElementById('filterSales').addEventListener('change', (e) => {
                currentFilters.sales = e.target.value;
                renderTable();
            });
            document.getElementById('filterCategory').addEventListener('change', (e) => {
                currentFilters.category = e.target.value;
                renderTable();
            });
            document.getElementById('resetFilters').addEventListener('click', () => {
                currentFilters = { country: "all", price: "all", margin: "all", sales: "all", category: "all" };
                document.getElementById('filterCountry').value = "all";
                document.getElementById('filterPrice').value = "all";
                document.getElementById('filterMargin').value = "all";
                document.getElementById('filterSales').value = "all";
                document.getElementById('filterCategory').value = "all";
                renderTable();
            });
        }

        let sortColumn = 0;
        let sortDirection = "asc";

        function sortTable(column) {
            if (sortColumn === column) {
                sortDirection = sortDirection === "asc" ? "desc" : "asc";
            } else {
                sortColumn = column;
                sortDirection = "asc";
            }
            
            const filtered = filterProducts();
            filtered.sort((a, b) => {
                let valA, valB;
                switch(column) {
                    case 0: valA = a.name; valB = b.name; break;
                    case 1: valA = a.price; valB = b.price; break;
                    case 2: valA = a.country; valB = b.country; break;
                    case 3: valA = a.margin; valB = b.margin; break;
                    case 4: valA = a.sold; valB = b.sold; break;
                    case 5: valA = a.trend; valB = b.trend; break;
                    default: return 0;
                }
                if (valA < valB) return sortDirection === "asc" ? -1 : 1;
                if (valA > valB) return sortDirection === "asc" ? 1 : -1;
                return 0;
            });
            
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = filtered.map(p => `
                <tr>
                    <td>
                        <div class="product-cell">
                            <img src="${p.image}" class="product-img" alt="${p.name}">
                            <span class="product-name">${p.name}</span>
                        </div>
                    </td>
                    <td class="price">$${p.price}</td>
                    <td>${p.country}</td>
                    <td class="${getMarginClass(p.margin)}">${p.margin}%</td>
                    <td>${p.sold.toLocaleString()}</td>
                    <td><span class="trend-badge ${p.trend}">${p.trend === 'trending' ? '🔥 TRENDING' : '🚀 UPCOMING'}</span></td>
                </tr>
            `).join('');
        }

        renderTable();
        setupFilters();
    </script>
</body>
</html>
